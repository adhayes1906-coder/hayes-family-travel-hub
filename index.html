<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel Hub</title>

<style>
body{margin:0;font-family:-apple-system;background:#0f172a;color:#fff}
.tabs{display:flex}
.tab{flex:1;padding:14px;background:#1e293b;border:none;color:#fff}
.active-tab{background:#2563eb}
.section{display:none;padding:16px}
.section.active{display:block}
.subtabs button{margin:5px;padding:8px;border:none;border-radius:8px;background:#334155;color:white}
.card{background:#1e293b;padding:14px;margin-bottom:10px;border-radius:10px}
a{color:#38bdf8;display:block;margin-top:5px}
</style>
</head>

<body>

<div class="tabs">
<button class="tab active-tab" onclick="showTab(event,'nyc')">NYC</button>
<button class="tab" onclick="showTab(event,'cruise')">Cruise</button>
</div>

<div id="nyc" class="section active">
<h2>NYC Trip</h2>

<div class="subtabs">
<button onclick="loadNYC('1')">Day 1</button>
<button onclick="loadNYC('2')">Day 2</button>
<button onclick="loadNYC('3')">Day 3</button>
<button onclick="loadNYC('4')">Day 4</button>
<button onclick="loadNYC('5')">Day 5</button>
<button onclick="loadNYC('map')">Subway Map</button>
</div>

<div id="nyc-content"></div>
</div>

<div id="cruise" class="section">
<h2>Cruise</h2>

<div class="subtabs">
<button onclick="loadCruise('1')">Day 1</button>
<button onclick="loadCruise('2')">Day 2</button>
<button onclick="loadCruise('3')">Day 3</button>
<button onclick="loadCruise('4')">Day 4</button>
<button onclick="loadCruise('5')">Day 5</button>
<button onclick="loadCruise('6')">Day 6</button>
<button onclick="loadCruise('7')">Day 7</button>
<button onclick="loadCruise('map')">Cruise Map</button>
</div>

<div id="cruise-content"></div>
</div>

<script src="data.js"></script>

<script>
function showTab(evt,id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active-tab'));
  document.getElementById(id).classList.add('active');
  evt.target.classList.add('active-tab');
}

function loadNYC(day){
  let c = document.getElementById("nyc-content");

  if(day==="map"){
    c.innerHTML=`<img src="https://upload.wikimedia.org/wikipedia/commons/8/89/NYC_subway-4D.svg" width="100%">`;
    return;
  }

  render(DATA.NYC[day], c);
}

function loadCruise(day){
  let c = document.getElementById("cruise-content");

  if(day==="map"){
    c.innerHTML=`<img src="https://www.royalcaribbean.com/content/dam/royal/resources/ports/maps/western-caribbean-map.jpg" width="100%">`;
    return;
  }

  render(DATA.CRUISE[day], c);
}

function render(text, container){
  let lines=text.split("\n").filter(l=>l.trim()!="");
  let html="";

  lines.forEach(line=>{
    if(line.startsWith("http")){
      html+=`<a href="${line}" target="_blank">Open Directions</a>`;
    } else {
      html+=`<div class="card"><b>${line}</b></div>`;
    }
  });

  container.innerHTML=html;
}
</script>

</body>
</html>
