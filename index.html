<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SHIELD Travel System</title>

<style>
body{margin:0;font-family:-apple-system;background:#000;color:#0f0;text-align:center}
button{width:90%;padding:16px;margin:10px;border:none;border-radius:12px;background:#0f0;color:#000;font-size:18px}
#hud{margin-top:20px;font-size:20px}
</style>
</head>

<body>

<h2>🛰️ SHIELD Travel System</h2>

<button onclick="activate()">Activate SHIELD</button>

<div id="hud">System Offline</div>

<script>

// SPEAK
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}

// STATE
let step = 0;

// YOUR NYC PLAN WITH LOGIC
const steps = [
  {text:"Walk to subway on 42nd Street",type:"walk"},
  {text:"Take 4 or 5 train downtown",type:"subway"},
  {text:"Exit at Brooklyn Bridge",type:"exit"},
  {text:"Walk bridge",type:"walk"},
  {text:"Explore DUMBO",type:"activity"}
];

// ACTIVATE
function activate(){
  speak("Shield system online");
  update();
  track();
  timeCheck();
}

// UPDATE STEP
function update(){
  if(step >= steps.length){
    speak("Mission complete");
    document.getElementById("hud").innerText="Complete";
    return;
  }

  let s = steps[step];
  document.getElementById("hud").innerText = s.text;

  speak(s.text);

  // SMART GUIDANCE
  if(s.type === "subway"){
    speak("Ensure you take a downtown train, not uptown");
  }
}

// NEXT
function next(){
  step++;
  update();
}

// LOCATION TRACKING
function track(){
  navigator.geolocation.watchPosition(pos=>{
    let lat = pos.coords.latitude;

    // SIMPLE MOVEMENT DETECTION
    if(lat){
      // simulate arrival trigger
      if(Math.random() < 0.05){
        speak("Arrived. Advancing.");
        next();
      }
    }
  });
}

// TIME-BASED ALERTS
function timeCheck(){
  setInterval(()=>{
    let now = new Date();

    let hours = now.getHours();
    let mins = now.getMinutes();

    // HAMILTON ALERT (example 6PM)
    if(hours === 18 && mins === 0){
      speak("You should leave now for Hamilton");
    }

  },60000);
}

</script>

</body>
</html>
