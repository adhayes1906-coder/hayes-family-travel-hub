<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hayes Family Travel</title>

<style>
body{margin:0;font-family:-apple-system;background:#0f172a;color:#fff}

.header{
  padding:20px;
  text-align:center;
  background:#020617;
}

.header h1{margin:0;font-size:22px}
.header p{margin:5px 0 0;font-size:14px;color:#94a3b8}

.tabs{display:flex}
.tab{
  flex:1;
  padding:14px;
  border:none;
  background:#1e293b;
  color:#fff;
  font-weight:600;
}
.active-tab{background:#2563eb}

.section{display:none;padding:20px}
.section.active{display:block}

.subtabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.subtabs button{
  flex:1 1 30%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
}

.day-tabs{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

.day-tabs button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#334155;
  color:white;
  font-size:12px;
}

.card{
  background:#1e293b;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
}

a{
  display:block;
  margin-top:6px;
  padding:8px;
  background:#2563eb;
  border-radius:8px;
  text-align:center;
  color:white;
  text-decoration:none;
  font-size:13px;
}

.map{width:100%;border-radius:12px;margin-top:10px}
</style>
</head>

<body>

<div class="header">
<h1>Hayes Family Travel</h1>
<p>NYC + Cruise Planner</p>
</div>

<div class="tabs">
<button class="tab active-tab" onclick="showTab(event,'nyc')">NYC Trip</button>
<button class="tab" onclick="showTab(event,'cruise')">Cruise</button>
</div>

<!-- NYC -->
<div id="nyc" class="section active">
<div class="subtabs">
<button onclick="loadNYC('1')">Day 1</button>
<button onclick="loadNYC('2')">Day 2</button>
<button onclick="loadNYC('3')">Day 3</button>
<button onclick="loadNYC('4')">Day 4</button>
<button onclick="loadNYC('5')">Day 5</button>
<button onclick="loadNYC('map')">Subway Map</button>
</div>

<div id="nyc-content"></div>
</div>

<!-- CRUISE -->
<div id="cruise" class="section">
<div class="subtabs">
<button onclick="loadCruise('1')">Day 1</button>
<button onclick="loadCruise('2')">Day 2</button>
<button onclick="loadCruise('3')">Day 3</button>
<button onclick="loadCruise('4')">Day 4</button>
<button onclick="loadCruise('5')">Day 5</button>
<button onclick="loadCruise('6')">Day 6</button>
<button onclick="loadCruise('7')">Day 7</button>
<button onclick="loadCruise('map')">Cruise Map</button>
</div>

<div id="cruise-content"></div>
</div>

<script src="data.js"></script>

<script>

function showTab(evt,id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active-tab'));
  document.getElementById(id).classList.add('active');
  evt.target.classList.add('active-tab');
}

function loadNYC(day){
  let c=document.getElementById("nyc-content");

  if(day==="map"){
    c.innerHTML=`<img class="map" src="https://upload.wikimedia.org/wikipedia/commons/8/89/NYC_subway-4D.svg">`;
    return;
  }

  renderDay(DATA.NYC[day],c);
}

function loadCruise(day){
  let c=document.getElementById("cruise-content");

  if(day==="map"){
    c.innerHTML=`<img class="map" src="https://www.royalcaribbean.com/content/dam/royal/resources/ports/maps/western-caribbean-map.jpg">`;
    return;
  }

  renderDay(DATA.CRUISE[day],c);
}

function renderDay(dayData,container){
  let html="";

  html+=`
    <div class="day-tabs">
      <button onclick="renderActivities()">Activities</button>
      <button onclick="renderDirections()">Directions</button>
    </div>
    <div id="day-content"></div>
  `;

  container.innerHTML=html;

  window.renderActivities = () => {
    let content="";
    dayData.activities.forEach(a=>{
      content+=`<div class="card">${a}</div>`;
    });
    document.getElementById("day-content").innerHTML=content;
  };

  window.renderDirections = () => {
    let content="";
    dayData.directions.forEach(d=>{
      let loc=d.map.split("q=")[1];
      let apple=`http://maps.apple.com/?daddr=${loc}`;

      content+=`
        <div class="card">
          <b>${d.title}</b><br>
          Subway: ${d.subway || "N/A"}
          <a href="${apple}">📍 Apple Maps</a>
        </div>
      `;
    });
    document.getElementById("day-content").innerHTML=content;
  };

  renderActivities();
}

</script>

</body>
</html>
